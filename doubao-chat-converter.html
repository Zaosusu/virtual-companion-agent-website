    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f6;
        --surface: #ffffff;
        --ink: #202729;
        --muted: #647174;
        --line: #d9e2de;
        --accent: #087f80;
        --accent-dark: #075f60;
        --accent-soft: #e9f5f2;
        --warm: #c65336;
        --danger: #a33232;
        --shadow: 0 12px 34px rgba(31, 48, 45, 0.08);
        font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.6;
      }
      button, input { font: inherit; }
      button { cursor: pointer; }
      a { color: inherit; }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
      }
      .nav,
      .workspace {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
      }
      .nav {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        font-weight: 900;
      }
      .logo {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: #fff;
        background: var(--accent);
      }
      .nav-links { display: flex; gap: 16px; color: var(--muted); }
      .offline-mode .nav-links { display: none; }
      .nav-links a { text-decoration: none; font-weight: 700; }

      .workspace { padding: 40px 0 64px; }
      .tool-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .tool-header p { margin: 8px 0 0; color: var(--muted); }
      .privacy {
        flex: 0 0 auto;
        color: var(--accent-dark);
        font-size: 14px;
        font-weight: 800;
      }

      .tool-shell {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .source-panel { padding: 24px; border-bottom: 1px solid var(--line); }
      .drop-zone {
        min-height: 180px;
        display: grid;
        place-items: center;
        padding: 24px;
        border: 2px dashed #a9bbb4;
        border-radius: 8px;
        text-align: center;
        background: #fbfdfc;
        transition: border-color 150ms ease, background 150ms ease;
      }
      .drop-zone.dragging { border-color: var(--accent); background: var(--accent-soft); }
      .drop-zone strong { display: block; font-size: 18px; }
      .drop-zone p { margin: 6px 0 18px; color: var(--muted); }
      .file-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

      .button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        color: #fff;
        background: var(--accent);
        font-weight: 800;
      }
      .button:hover { background: var(--accent-dark); }
      .button.secondary { color: var(--accent-dark); background: #fff; }
      .button.secondary:hover { background: var(--accent-soft); }
      .button:disabled { cursor: not-allowed; opacity: 0.45; }

      .file-summary {
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        min-height: 96px;
      }
      .file-summary.visible { display: grid; }
      .file-name { margin: 0; font-size: 19px; word-break: break-word; }
      .file-meta { margin: 4px 0 0; color: var(--muted); }
      .summary-actions { display: flex; gap: 10px; }

      .settings-panel {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
        gap: 28px;
        padding: 24px;
        border-bottom: 1px solid var(--line);
      }
      .settings-panel h2,
      .preview-panel h2 { margin: 0 0 14px; font-size: 18px; letter-spacing: 0; }
      .format-control {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .format-control label { position: relative; }
      .format-control input { position: absolute; opacity: 0; }
      .format-option {
        min-height: 66px;
        display: grid;
        align-content: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }
      .format-option b { font-size: 15px; }
      .format-option span { color: var(--muted); font-size: 12px; }
      .format-control input:checked + .format-option {
        border-color: var(--accent);
        color: var(--accent-dark);
        background: var(--accent-soft);
      }
      .format-control input:focus-visible + .format-option { outline: 3px solid rgba(8, 127, 128, 0.22); }
      .options { display: grid; gap: 10px; align-content: start; }
      .title-field { display: grid; gap: 6px; margin-bottom: 14px; color: #3f4b4d; font-weight: 800; }
      .title-field input {
        width: 100%;
        min-height: 42px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #fff;
      }
      .title-field input:focus { outline: 3px solid rgba(8, 127, 128, 0.16); border-color: var(--accent); }
      .check-row { display: flex; align-items: center; gap: 9px; color: #3f4b4d; }
      .check-row input { width: 17px; height: 17px; accent-color: var(--accent); }

      .preview-panel { padding: 24px; }
      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .message-count { color: var(--muted); font-size: 14px; }
      .preview-list {
        max-height: 420px;
        overflow: auto;
        border-top: 1px solid var(--line);
      }
      .preview-empty { padding: 38px 0; color: var(--muted); text-align: center; }
      .preview-message {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 14px;
        padding: 15px 0;
        border-bottom: 1px solid #edf1ef;
      }
      .speaker { color: var(--accent-dark); font-weight: 900; }
      .speaker.system { color: var(--warm); }
      .message-text { margin: 0; white-space: pre-wrap; word-break: break-word; }

      .action-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 24px;
        border-top: 1px solid var(--line);
        background: #fbfcfb;
      }
      .status { min-height: 24px; color: var(--muted); }
      .status.error { color: var(--danger); }
      .status.success { color: var(--accent-dark); }

      @media (max-width: 760px) {

        .nav-links { flex-direction: column; align-items: flex-end; gap: 4px; }
        .tool-header { align-items: flex-start; flex-direction: column; }
        .settings-panel { grid-template-columns: 1fr; }
        .format-control { grid-template-columns: 1fr; }
        .file-summary { grid-template-columns: 1fr; }
        .summary-actions { flex-wrap: wrap; }
        .preview-message { grid-template-columns: 56px minmax(0, 1fr); }
        .action-bar { align-items: stretch; flex-direction: column; }
        .action-bar .button { width: 100%; }
      }

    <header class="site-header">

    <main class="workspace">

              <p class="file-meta" id="fileMeta"></p>
            </div>
            <div class="summary-actions">
              <button class="button secondary" id="replaceFileButton" type="button">更换文件</button>
              <button class="button secondary" id="clearFileButton" type="button">清除</button>
            </div>
          </div>
        </div>

        <div class="settings-panel">
          <div>
            <h2>输出格式</h2>

              <label>
                <input type="radio" name="outputFormat" value="txt" checked />
                <span class="format-option"><b>TXT</b><span>纯文本，通用兼容</span></span>
              </label>
              <label>
                <input type="radio" name="outputFormat" value="docx" />
                <span class="format-option"><b>Word</b><span>标准 DOCX 文档</span></span>
              </label>
              <label>
                <input type="radio" name="outputFormat" value="md" />

              </label>
            </div>
          </div>

          <div>

            <div class="options">

        </div>

        <div class="preview-panel">
