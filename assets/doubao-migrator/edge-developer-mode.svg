<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Edge 开发人员模式位置示意图</title>
  <desc id="desc">Edge 扩展页面左侧开发人员模式开关，以及加载解压缩的扩展按钮的位置。</desc>
  <rect width="1180" height="720" rx="26" fill="#f6faf8"/>
  <rect x="46" y="52" width="1088" height="608" rx="20" fill="#ffffff" stroke="#d5e3de" stroke-width="2"/>
  <rect x="46" y="52" width="1088" height="72" rx="20" fill="#eef6f3"/>
  <circle cx="84" cy="88" r="8" fill="#ef6f6c"/>
  <circle cx="110" cy="88" r="8" fill="#f6c85f"/>
  <circle cx="136" cy="88" r="8" fill="#5fbd7b"/>
  <rect x="188" y="70" width="390" height="36" rx="18" fill="#ffffff" stroke="#d5e3de"/>
  <text x="214" y="94" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#627174">edge://extensions</text>

  <rect x="46" y="124" width="286" height="536" fill="#f8faf8"/>
  <text x="92" y="182" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2528">扩展</text>
  <rect x="92" y="220" width="174" height="42" rx="9" fill="#eef2f1"/>
  <text x="112" y="248" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#627174">已安装的扩展</text>

  <text x="382" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2528">管理扩展</text>
  <rect x="382" y="248" width="250" height="54" rx="9" fill="#0f8b8d"/>
  <text x="414" y="283" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">加载解压缩的扩展</text>
  <rect x="382" y="338" width="620" height="68" rx="10" fill="#eef2f1"/>
  <text x="410" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#627174">选择解压出来的插件文件夹，不要选择 zip 文件。</text>

  <rect x="92" y="502" width="206" height="58" rx="29" fill="#dff3ec" stroke="#0f8b8d" stroke-width="3"/>
  <circle cx="266" cy="531" r="20" fill="#0f8b8d"/>
  <text x="112" y="539" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#096466">开发人员模式</text>

  <path d="M322 531 L370 531" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <path d="M370 531 L350 511" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <path d="M370 531 L350 551" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <rect x="392" y="486" width="380" height="94" rx="14" fill="#fff1f0" stroke="#d94841" stroke-width="2"/>
  <text x="424" y="522" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#9f1d1d">第一步</text>
  <text x="424" y="554" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#7a2b2b">打开左侧栏下方“开发人员模式”</text>

  <path d="M508 430 L508 306" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <path d="M508 306 L488 326" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <path d="M508 306 L528 326" stroke="#d94841" stroke-width="5" stroke-linecap="round"/>
  <rect x="650" y="228" width="378" height="94" rx="14" fill="#fff1f0" stroke="#d94841" stroke-width="2"/>
  <text x="682" y="264" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#9f1d1d">第二步</text>
  <text x="682" y="296" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#7a2b2b">点击“加载解压缩的扩展”</text>
</svg>
